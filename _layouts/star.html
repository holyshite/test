<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">

<head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            try {
                var bg = localStorage.getItem('site-bg');
                if (bg) document.documentElement.setAttribute('data-bg', bg);
            } catch (e) { }
        })();
    </script>
    <link rel="preload" href="{{ '/assets/css/style.css' | absolute_url }}" as="style">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | absolute_url }}">
</head>

<body class="star-canvas-page">
    {% include header.html %}

    <main class="home-quote-shell">
        <section class="glass-card home-quote-card" aria-label="首页引言">
            <p class="home-quote-line" id="homeQuoteText" data-text="这是一句很有哲理的话..."></p>
            <p class="home-quote-author" id="homeQuoteAuthor" data-text="——BigPeter"></p>
            <div class="home-icon-list" aria-label="首页图标">
                <a class="home-icon-item" href="https://gitee.com/BigPanZH" title="Gitee" aria-label="Gitee">
                    <img src="{{ '/assets/icon/gitee.svg' | relative_url }}" alt="Gitee">
                </a>
                <a class="home-icon-item" href="https://github.com/holyshite" title="GitHub" aria-label="GitHub">
                    <img src="{{ '/assets/icon/github.svg' | relative_url }}" alt="GitHub">
                </a>
                <a class="home-icon-item" href="mailto:616pwpwpwpw@gmail.com" title="Gmail" aria-label="Gmail">
                    <img src="{{ '/assets/icon/gmail.svg' | relative_url }}" alt="Gmail">
                </a>
                <a class="home-icon-item" href="mailto:751802108@qq.com" title="QQ Mail" aria-label="QQ Mail">
                    <img src="{{ '/assets/icon/QQmail.svg' | relative_url }}" alt="QQ Mail">
                </a>
                <a class="home-icon-item" href="https://steamcommunity.com/profiles/76561199520206774/" title="Steam"
                    aria-label="Steam">
                    <img src="{{ '/assets/icon/steam.svg' | relative_url }}" alt="Steam">
                </a>
            </div>
        </section>
    </main>

    <script src="{{ '/assets/js/theme.js' | absolute_url }}" defer></script>
    <script src="{{ '/assets/js/nav.js' | absolute_url }}" defer></script>
    <script src="{{ '/assets/js/prefetch.js' | absolute_url }}" defer></script>
    <script>
        (function () {
            function typeText(element, text, speed, done) {
                if (!element) return;

                var index = 0;
                element.textContent = '';

                function step() {
                    if (index < text.length) {
                        element.textContent += text.charAt(index);
                        index += 1;
                        window.setTimeout(step, speed);
                        return;
                    }

                    if (typeof done === 'function') {
                        done();
                    }
                }

                step();
            }

            function initHomeTyping() {
                var quote = document.getElementById('homeQuoteText');
                var author = document.getElementById('homeQuoteAuthor');
                if (!quote || !author) return;

                typeText(quote, quote.dataset.text || '', 90, function () {
                    window.setTimeout(function () {
                        typeText(author, author.dataset.text || '', 75);
                    }, 180);
                });
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initHomeTyping, { once: true });
            } else {
                initHomeTyping();
            }
        })();
    </script>
</body>

</html>
