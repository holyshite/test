<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">

<head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            try {
                var bg = localStorage.getItem('site-bg');
                if (bg) document.documentElement.setAttribute('data-bg', bg);
                if (localStorage.getItem('flashlight-mode') === 'on') {
                    var s = document.createElement('style');
                    s.textContent = '.flashlight-overlay{position:fixed;inset:0;z-index:1001;pointer-events:none;background:radial-gradient(circle 140px at 50% 50%,transparent 0,transparent 130px,rgba(0,0,0,0.92) 140px,#000 100%)}';
                    document.head.appendChild(s);
                    var d = document.createElement('div');
                    d.className = 'flashlight-overlay';
                    document.addEventListener('DOMContentLoaded', function () {
                        if (!document.querySelector('.flashlight-overlay')) {
                            document.body.appendChild(d);
                        }
                        document.body.classList.add('flashlight-mode');
                    });
                }
            } catch (e) { }
        })();
    </script>
    <link rel="preload" href="{{ '/assets/css/style.css' | absolute_url }}" as="style">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | absolute_url }}">
</head>

<body class="star-canvas-page">
    {% include header.html %}

    <main class="page-container">
        <div class="page-shell">
            <div class="glass-card page-main-card checkin-main-card">
                <div class="page-content">
                    {{ content }}
                </div>
            </div>
        </div>
    </main>

    <script src="{{ '/assets/js/theme.js' | absolute_url }}" defer></script>
    <script src="{{ '/assets/js/nav.js' | absolute_url }}" defer></script>
    <script src="{{ '/assets/js/prefetch.js' | absolute_url }}" defer></script>
    <script src="{{ '/assets/js/checkin.js' | absolute_url }}" defer></script>
</body>

</html>
